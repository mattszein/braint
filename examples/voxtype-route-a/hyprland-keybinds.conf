# Route A: push-to-talk voice capture → braint (direct verb grammar, no AI)
# Add this to your hyprland.conf or source it from there.
#
# Super+V: start recording with the 'daemon' Voxtype profile.
# Hold while speaking, release to stop. Transcript is sent to braint.
# A desktop notification will appear for confirmation.

bindd = SUPER, V, Capture idea via voice (braint Route A), exec, voxtype record start --profile=daemon
